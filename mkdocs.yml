site_name: Agent Patterns Lab
site_url: !ENV [SITE_URL, "https://agent-patterns-lab.pages.dev/"]

repo_url: !ENV [REPO_URL, "https://github.com/lifeodyssey/agent-patterns-lab"]
repo_name: !ENV [REPO_NAME, "lifeodyssey/agent-patterns-lab"]
edit_uri: !ENV [EDIT_URI, "edit/main/docs/"]

exclude_docs: |
  superpowers/
  en/patterns/_template.md
  zh/patterns/_template.md

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.expand
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
    - scheme: slate
      primary: indigo
      accent: indigo

plugins:
  - search
  - mermaid2
  - i18n:
      docs_structure: folder
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh
          name: 简体中文
          build: true
          nav_translations:
            Home: 首页
            Guide: 入门路线
            Start Here: 从这里开始
            Command Notes: 命令解释
            From Chatbot to Agent: 从 Chatbot 到 Agent
            00 Minimal Chatbot: 00 最小 Chatbot
            01 Conversation History: 01 对话历史
            02 Structured Output: 02 结构化输出
            03 Tool Calling: 03 工具调用
            04 Workflow: 04 Workflow
            05 Agent Loop: 05 Agent Loop
            Mental Model: 心智模型
            Choose a Pattern: 选择模式
            Glossary: 术语表
            Building Blocks: 基建
            Patterns: 模式
            Workflow: 工作流
            Agent Loop: Agent Loop
            Reliability: 可靠性
            Memory & Retrieval: 记忆与检索
            Planning & Search: 规划与搜索
            Multi-Agent: 多智能体
            Governance: 治理与安全
            Evaluation: 评测与回归
            Eval Harness: Eval Harness
            Editorial Rubric: 写作 Rubric

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom

nav:
  - Guide:
      - Home: index.md
      - Start Here: start_here.md
      - Command Notes: run_commands.md
      - From Chatbot to Agent:
          - 00 Minimal Chatbot: tutorial/00_chatbot.md
          - 01 Conversation History: tutorial/01_conversation.md
          - 02 Structured Output: tutorial/02_structured_output.md
          - 03 Tool Calling: tutorial/03_tool_calling.md
          - 04 Workflow: tutorial/04_workflow.md
          - 05 Agent Loop: tutorial/05_agent_loop.md
      - Mental Model: mental_model.md
      - Choose a Pattern: choose_pattern.md
      - Glossary: glossary.md
  - Building Blocks:
      - Runtime Overview: building_blocks/runtime.md
      - Structured Output: building_blocks/structured_output.md
      - Tool Calling: building_blocks/tools.md
      - Loop Controller: building_blocks/runner.md
      - Tracing: building_blocks/tracing.md
      - Reliability Primitives: building_blocks/reliability.md
      - Cache: building_blocks/cache.md
      - Memory: building_blocks/memory.md
      - Retrieval: building_blocks/retrieval.md
  - Patterns:
      - Workflow:
          - Prompt Chaining: patterns/workflow_chaining.md
          - Routing: patterns/routing.md
      - Agent Loop:
          - ReAct: patterns/react.md
      - Reliability:
          - Maker-Checker: patterns/maker_checker.md
          - Voting: patterns/voting.md
          - Chain-of-Verification: patterns/cove.md
      - Memory & Retrieval:
          - Retrieval Loop: patterns/retrieval_loop.md
          - Agentic RAG: patterns/agentic_rag.md
          - Reflexion: patterns/reflexion.md
          - STORM: patterns/storm.md
      - Planning & Search:
          - Plan & Solve: patterns/plan_and_solve.md
          - Planner-Executor-Replanner: patterns/planner_executor_replanner.md
          - REWOO: patterns/rewoo.md
          - LLM Compiler: patterns/llm_compiler.md
          - LATS: patterns/lats.md
          - Self-Discovery: patterns/self_discovery.md
      - Multi-Agent:
          - Manager-Worker: patterns/manager_worker.md
          - Agents-as-Tools: patterns/agents_as_tools.md
          - Group Chat: patterns/group_chat.md
          - Handoff: patterns/handoff.md
          - Magentic Orchestration: patterns/magentic_orchestration.md
  - Governance:
      - Policy: governance/policy.md
      - Guardrails: governance/guardrails.md
      - HITL: governance/hitl.md
  - Evaluation:
      - Eval Harness: evaluation/eval_harness.md
      - Editorial Rubric: evaluation/editorial_rubric.md
